<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PixelMatch - Create Account</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    background:linear-gradient(135deg,#ff4fa3,#ff7ac3,#b84cff);
    display:flex;
    justify-content:center;
    align-items:center;
    padding:30px;
    overflow-x:hidden;
}

/* Background Effects */

.circle{
    position:fixed;
    border-radius:50%;
    background:rgba(255,255,255,0.1);
    z-index:-1;
}

.circle1{
    width:250px;
    height:250px;
    top:-80px;
    left:-80px;
}

.circle2{
    width:180px;
    height:180px;
    bottom:-60px;
    right:-60px;
}

.circle3{
    width:120px;
    height:120px;
    top:25%;
    right:10%;
}

/* Glass Card */

.register-container{
    width:100%;
    max-width:750px;
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(20px);
    -webkit-backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,0.2);
    border-radius:30px;
    padding:40px;
    box-shadow:0 25px 45px rgba(0,0,0,0.15);
}

/* Header */

.logo{
    text-align:center;
    color:white;
    font-size:2.5rem;
    font-weight:700;
    margin-bottom:10px;
}

.subtitle{
    text-align:center;
    color:white;
    opacity:0.9;
    margin-bottom:35px;
    line-height:1.8;
}

/* Error Box */

.error-box{
    background:rgba(255,80,80,0.2);
    border:1px solid rgba(255,255,255,0.2);
    color:white;
    padding:15px;
    border-radius:15px;
    margin-bottom:20px;
}

/* Form Grid */

.form-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
}

.form-group{
    margin-bottom:20px;
}

.full-width{
    grid-column:1/3;
}

label{
    display:block;
    color:white;
    margin-bottom:8px;
    font-weight:500;
}

input,
select,
textarea{
    width:100%;
    padding:15px;
    border:none;
    border-radius:15px;
    background:rgba(255,255,255,0.2);
    color:white;
    font-size:1rem;
    outline:none;
}

input::placeholder,
textarea::placeholder{
    color:rgba(255,255,255,0.8);
}

select option{
    color:black;
}

textarea{
    resize:none;
    height:120px;
}

/* Upload */

.file-upload{
    padding:12px;
}

/* Button */

.register-btn{
    width:100%;
    padding:18px;
    border:none;
    border-radius:50px;
    background:white;
    color:#ff4fa3;
    font-size:1rem;
    font-weight:700;
    cursor:pointer;
    transition:.3s;
    margin-top:10px;
}

.register-btn:hover{
    transform:translateY(-4px);
    box-shadow:0 15px 25px rgba(0,0,0,0.15);
}

/* CTA */

.cta{
    text-align:center;
    margin-top:30px;
    color:white;
}

.cta a{
    color:white;
    font-weight:700;
    text-decoration:none;
}

.cta a:hover{
    text-decoration:underline;
}

/* Benefits */

.benefits{
    display:flex;
    justify-content:space-between;
    gap:15px;
    margin-top:30px;
}

.benefit{
    flex:1;
    background:rgba(255,255,255,0.12);
    border-radius:15px;
    padding:15px;
    text-align:center;
    color:white;
    transition:.3s;
}

.benefit:hover{
    transform:translateY(-5px);
}

/* Mobile */

@media(max-width:768px){

.register-container{
    padding:25px;
}

.logo{
    font-size:2rem;
}

.form-grid{
    grid-template-columns:1fr;
}

.full-width{
    grid-column:auto;
}

.benefits{
    flex-direction:column;
}

}

</style>
</head>
<body>

<div class="circle circle1"></div>
<div class="circle circle2"></div>
<div class="circle circle3"></div>

<div class="register-container">

    <h1 class="logo">💖 PixelMatch</h1>

    <p class="subtitle">
        Create your profile and start meeting amazing people today.
    </p>

    {% if error %}
    <div class="error-box">
        {{ error }}
    </div>
    {% endif %}

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}

        <div class="form-grid">

            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" placeholder="Choose a username" required>
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" placeholder="Enter your email" required>
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Create password" required>
            </div>

            <div class="form-group">
                <label>Age</label>
                <input type="number" name="age" placeholder="Your age" required>
            </div>

            <div class="form-group">
                <label>Gender</label>
                <select name="gender">
                    <option value="">Select Gender</option>
                    <option>Male</option>
                    <option>Female</option>
                    <option>Other</option>
                </select>
            </div>

            <div class="form-group">
                <label>Location</label>
                <input type="text" name="location" placeholder="Your city">
            </div>

            <div class="form-group full-width">
                <label>About You</label>
                <textarea
                    name="bio"
                    placeholder="Tell people about yourself..."></textarea>
            </div>

            <div class="form-group full-width">
                <label>Profile Photo</label>
                <input
                    type="file"
                    name="profile_image"
                    class="file-upload">
            </div>

        </div>

        <button type="submit" class="register-btn">
            Create Account ❤️
        </button>

    </form>

    <div class="cta">
        Already have an account?
        <a href="{% url 'login' %}">
            Login
        </a>
    </div>

    <div class="benefits">

        <div class="benefit">
            ❤️ Smart Matching
        </div>

        <div class="benefit">
            💬 Live Chat
        </div>

        <div class="benefit">
            ✨ Real Connections
        </div>

    </div>

</div>

</body>
</html>
